<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#007aff">
<link rel="manifest" href="manifest.json">
<title>シス単テスト</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont;
  background:#f2f2f7;
}
.header{
  background:#007aff;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}
.card{
  margin:20px;
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
button{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:12px;
  font-size:16px;
}
.choice{background:#e5e5ea;}
.correct{background:#34c759;color:white;}
.wrong{background:#ff3b30;color:white;}
#question{
  font-size:20px;
  font-weight:bold;
  margin:15px 0;
}
#score{
  margin-top:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">シス単テスト</div>

<div class="card">
<input type="file" id="fileInput">
<p id="question">CSVを読み込んでください</p>
<div id="choices"></div>
<p id="score"></p>
</div>

<script>
if ('serviceWorker' in navigator') {
  navigator.serviceWorker.register('service-worker.js');
}

let words=[],current,score=0,total=0;

document.getElementById("fileInput").addEventListener("change",function(e){
  const reader=new FileReader();
  reader.onload=function(){
    const lines=reader.result.split("\n").filter(l=>l.trim()!=="");
    words=lines.map(line=>{
      const parts=line.split(",");
      return {
        english:parts[0],
        japanese:parts[1]
      };
    });
    score=0;
    total=0;
    nextQuestion();
  }
  reader.readAsText(e.target.files[0]);
});

function shuffle(a){return a.sort(()=>Math.random()-0.5);}

function nextQuestion(){
  if(words.length===0)return;

  document.getElementById("choices").innerHTML="";

  current=words[Math.floor(Math.random()*words.length)];
  document.getElementById("question").textContent=current.english;

  let options=[current.japanese];
  while(options.length<4){
    let w=words[Math.floor(Math.random()*words.length)].japanese;
    if(!options.includes(w))options.push(w);
  }

  shuffle(options).forEach(opt=>{
    let btn=document.createElement("button");
    btn.textContent=opt;
    btn.className="choice";
    btn.onclick=()=>check(btn,opt);
    document.getElementById("choices").appendChild(btn);
  });
}

function check(btn,opt){
  total++;
  if(opt===current.japanese){
    score++;
    btn.classList.add("correct");
  }else{
    btn.classList.add("wrong");
  }

  document.getElementById("score").textContent="Score: "+score+" / "+total;

  setTimeout(nextQuestion,800);
}
</script>

</body>
</html>
